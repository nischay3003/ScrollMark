<!DOCTYPE html>
<html>
<head>
  <title>Bookmarks</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body {
      width: 400px;
      min-height: 300px;
      font-family: Arial, sans-serif;
      padding: 10px;
      margin: 0;
    }

    h3 {
      margin-top: 0;
    }

    #list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      margin: 5px 0;
      background: #f0f0f0;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .bookmark-name {
      flex: 1;
      cursor: pointer;
    }

    .bookmark-name:hover {
      text-decoration: underline;
    }

    #delete-btn {
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 3px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
      margin-left: 10px;
    }

    #delete-btn:hover{
      background: #cc0000;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h3>Saved Bookmarks</h3>
  <ul id="list"></ul>

  <script src="popup.js"></script>
</body>
</html>
